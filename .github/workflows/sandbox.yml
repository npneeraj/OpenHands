name: Reproduce Sandbox User Ownership Issue

on:
  workflow_dispatch:

jobs:
  test-docker-sandbox-user:
    runs-on: ubuntu-latest
    env:
      SANDBOX_USER_ID: 12345
      WORKSPACE_MOUNT_PATH: ${{ github.workspace }}/workspace
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare workspace
        run: mkdir -p $WORKSPACE_MOUNT_PATH

      - name: Build OpenHands Docker image
        run: |
          docker build \
            -f containers/app/Dockerfile \
            -t openhands:test .

      - name: Run container with SANDBOX_USER_ID
        run: |
          docker run --rm \
            -e SANDBOX_USER_ID=${{ env.SANDBOX_USER_ID }} \
            -e WORKSPACE_MOUNT_PATH=/opt/workspace_base \
            -v $WORKSPACE_MOUNT_PATH:/opt/workspace_base \
            openhands:test \
            bash -c "
              echo 'Created by container' > /opt/workspace_base/testfile &&
              ls -l /opt/workspace_base &&
              stat -c '%u:%g' /opt/workspace_base/testfile
            "
